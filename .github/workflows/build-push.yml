# 在推送 GitHub tag 时：先跑测试，通过后构建并推送镜像到 Docker Hub
# 需在仓库 Settings → Secrets and variables → Actions 中配置：
#   DOCKERHUB_USERNAME - Docker Hub 用户名（如 z1wu97）
#   DOCKERHUB_TOKEN    - Docker Hub Access Token（推荐用 token，不用登录密码）
name: Build and Push Image

on:
  push:
    tags:
      - 'v*'   # 例如 v1.0.0、v0.2.0

env:
  # 镜像将推送到 docker.io/<DOCKERHUB_USERNAME>/mini-card-game:<tag>
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/mini-card-game

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.10

      - name: Install backend dependencies and run tests
        working-directory: backend
        run: |
          uv sync --frozen
          uv run pytest tests/ -m unit -v --tb=short

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build

  build-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: https://index.docker.io/v1/
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata and build
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.deploy
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
